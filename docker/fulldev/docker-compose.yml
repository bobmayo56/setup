services:
  dev:
    container_name: fulldev
    hostname: fulldev
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ~/github:/workspace
      - ~/.gitconfig:/root/.gitconfig:ro
      - ~/.ssh:/root/.ssh:ro
      - ~/.aws:/root/.aws:ro
      - ~/.config/rclone:/root/.config/rclone:ro
      - ~/.claude:/root/.claude
    environment:
      - CLAUDE_CONFIG_DIR=/root/.claude
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
      - "8080:8080"
      - "8088:8088"
      - "8089:8089"
      - "8090:8090"
    stdin_open: true
    tty: true
